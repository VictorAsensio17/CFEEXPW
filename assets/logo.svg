<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Fondo verde del club -->
  <rect width="180" height="180" fill="#2a7d6f" rx="8"/>
  
  <!-- Línea vertical dorada -->
  <line x1="90" y1="15" x2="90" y2="165" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- Letra C grande y elegante dorada (izquierda) -->
  <path d="M 50 40 Q 30 60 30 90 Q 30 120 50 140" 
        fill="none" stroke="#D4AF37" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Letra F dorada (derecha) -->
  <g font-family="Georgia, serif" font-size="75" font-weight="bold" fill="#D4AF37">
    <text x="105" y="135">F</text>
  </g>
  
  <!-- Pequeño texto EEX abajo a la izquierda -->
  <text x="25" y="165" font-family="Georgia, serif" font-size="11" fill="#D4AF37" font-weight="bold" letter-spacing="1">EEX</text>
</svg>
