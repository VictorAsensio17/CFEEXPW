<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Fondo verde oscuro elegante (como el logo) -->
  <rect width="200" height="200" fill="#2a7d6f"/>
  
  <!-- Línea vertical dorada separadora -->
  <line x1="95" y1="15" x2="95" y2="185" stroke="#C9A961" stroke-width="2.5"/>
  
  <!-- Letra C grande dorada izquierda -->
  <path d="M 55 45 Q 35 65 35 100 Q 35 135 55 155" 
        fill="none" stroke="#C9A961" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Letras F dorada derecha (CF) -->
  <g font-family="Georgia, serif" font-size="78" font-weight="bold" fill="#C9A961" letter-spacing="-2">
    <text x="110" y="145">F</text>
  </g>
</svg>
